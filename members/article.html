<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexSky — Members</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231A1F3D'/%3E%3Ctext x='4' y='22' font-family='serif' font-size='18' fill='white'%3EN%3C/text%3E%3Ctext x='16' y='22' font-family='serif' font-size='18' fill='%23B8965A'%3ES%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/members/portal.css?v=7">
</head>
<body>

<nav class="nav">
  <div class="nav-left">
    <a href="/members/" class="nav-wordmark">Nex<span class="sky">Sky</span></a>
    <span class="nav-badge">Members</span>
  </div>
  <div class="nav-center">
    <a href="/members/">Hub</a>
    <a href="/members/cio.html">CIO</a>
    <a href="/members/research.html?type=briefing">Daily Briefing</a>
    <a href="/members.html">Live Market</a>
    <a href="/members/research.html?type=opportunities">Opportunities</a>
    <a href="/members/research.html?type=research">Research</a>
  </div>
  <a href="/cdn-cgi/access/logout" class="nav-logout">Sign out</a>
</nav>

<main style="margin-top:96px">
  <a class="back-link" href="/members/research.html">&larr; Back to library</a>
  <article class="article" id="article"><div class="lib-empty">Loading&hellip;</div></article>
</main>

<footer class="footer">
  <div class="footer-wordmark">Nex<span class="sky">Sky</span></div>
  <div>Private &amp; confidential &middot; For NexSky members only</div>
</footer>

<script src="/members/library.js?v=7"></script>
<script>
  (async () => {
    const slug = new URLSearchParams(location.search).get('slug');
    const el = document.getElementById('article');
    if (!slug || !/^[a-z0-9\-]+$/i.test(slug)) { el.innerHTML = '<div class="lib-empty">No article specified.</div>'; return; }
    try {
      const items = await loadLibrary();
      const meta = items.find(i => i.slug === slug) || {};
      document.title = 'NexSky — ' + (meta.title || 'Members');

      // Opportunities have no content fragment; render a standard detail page:
      // summary, an embedded teaser, and download + reach-out actions.
      if (meta.type === 'opportunities') {
        const pdf = meta.pdfUrl || (meta.format === 'pdf' ? meta.url : '');
        const dl = pdf ? '<a class="lib-btn primary" href="' + esc(pdf) + '" target="_blank" rel="noopener">Download teaser (PDF)</a>' : '';
        el.innerHTML =
          '<div class="article-tag">' + esc(typeLabel(meta.type)) + '</div>' +
          '<h1>' + esc(meta.title || slug) + '</h1>' +
          '<div class="article-meta">' + esc(fmtDate(meta.date || '')) + ' &middot; NexSky</div>' +
          '<div class="article-body">' +
            '<p class="opp-lead">' + esc(meta.summary || '') + '</p>' +
            '<div class="lib-actions" style="margin:22px 0 4px;">' + dl +
              '<button type="button" class="lib-btn ghost" id="oppContact">Reach out for more information</button>' +
            '</div>' +
            '<div id="oppPanel" class="opp-contact" hidden>' +
              'For more information, email us at <a class="opp-email" id="oppEmail" href="#">contact@nexsky.io</a>' +
              '<button type="button" class="opp-copy" id="oppCopy">Copy</button>' +
              '<span class="opp-copied" id="oppCopied" hidden>Copied to clipboard</span>' +
            '</div>' +
          '</div>';
        // mailto often has no handler (no result in some browsers), so the button
        // reveals + copies the address; the link is a mailto fallback for those who have one.
        var em = document.getElementById('oppEmail');
        if (em) em.href = oppMailto(meta);
        function copyAddr() {
          var ok = document.getElementById('oppCopied');
          try { navigator.clipboard.writeText('contact@nexsky.io'); if (ok) ok.hidden = false; } catch (e) {}
        }
        var btn = document.getElementById('oppContact');
        if (btn) btn.addEventListener('click', function () {
          var p = document.getElementById('oppPanel');
          if (p) p.hidden = false;
          copyAddr();
        });
        var cp = document.getElementById('oppCopy');
        if (cp) cp.addEventListener('click', copyAddr);
        return;
      }

      const res = await fetch('/members/content/' + slug + '.html', { cache: 'no-cache' });
      const body = res.ok ? await res.text() : '<p>This piece is not available.</p>';
      // Standard PDF download button. CIO letters resolve their PDF by convention
      // (/members/files/<slug>.pdf); any item may also set meta.pdfUrl explicitly.
      const pdfUrl = meta.pdfUrl || (meta.type === 'cio' ? '/members/files/' + slug + '.pdf' : '');
      // Version the link so no browser ever serves a stale 404 for a freshly published PDF.
      const pdfHref = pdfUrl ? pdfUrl + (pdfUrl.indexOf('?') >= 0 ? '&' : '?') + 'v=' + encodeURIComponent(meta.date || '1') : '';
      const pdfBtn = pdfHref
        ? '<a class="lib-btn primary" href="' + esc(pdfHref) + '" target="_blank" rel="noopener" style="display:inline-block;margin:16px 0 6px;">Download PDF &darr;</a>'
        : '';
      el.innerHTML =
        '<div class="article-tag">' + esc(typeLabel(meta.type || '')) + '</div>' +
        '<h1>' + esc(meta.title || slug) + '</h1>' +
        '<div class="article-meta">' + esc(fmtDate(meta.date || '')) + ' &middot; NexSky</div>' +
        pdfBtn +
        '<div class="article-body">' + body + '</div>';
    } catch (e) {
      el.innerHTML = '<div class="lib-empty">Unable to load this piece.</div>';
    }
  })();
</script>
</body>
</html>
