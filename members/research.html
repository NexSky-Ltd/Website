<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexSky — Research Library</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231A1F3D'/%3E%3Ctext x='4' y='22' font-family='serif' font-size='18' fill='white'%3EN%3C/text%3E%3Ctext x='16' y='22' font-family='serif' font-size='18' fill='%23B8965A'%3ES%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/members/portal.css?v=7">
</head>
<body>

<nav class="nav">
  <div class="nav-left">
    <a href="/members/" class="nav-wordmark">Nex<span class="sky">Sky</span></a>
    <span class="nav-badge">Members</span>
  </div>
  <div class="nav-center">
    <a href="/members/">Hub</a>
    <a href="/members/cio.html">CIO</a>
    <a href="/members/research.html?type=briefing">Daily Briefing</a>
    <a href="/members.html">Live Market</a>
    <a href="/members/research.html?type=opportunities">Opportunities</a>
    <a href="/members/research.html?type=research">Research</a>
  </div>
  <a href="/cdn-cgi/access/logout" class="nav-logout">Sign out</a>
</nav>

<header class="page-header">
  <div class="page-header-inner">
    <div class="page-label" id="pLabel">Research Library</div>
    <h1 class="page-title" id="pTitle">Publications &amp; analysis</h1>
    <p class="page-sub" id="pSub">The CIO house view, daily briefings, opportunities and research, in one place.</p>
  </div>
</header>

<main>
  <div class="filters" id="filters">
    <button class="filter active" data-type="all">All</button>
    <button class="filter" data-type="cio">CIO</button>
    <button class="filter" data-type="briefing">Daily Briefing</button>
    <button class="filter" data-type="opportunities">Opportunities</button>
    <button class="filter" data-type="research">Research</button>
  </div>
  <div class="lib-grid" id="libGrid"><div class="lib-empty">Loading&hellip;</div></div>
</main>

<footer class="footer">
  <div class="footer-wordmark">Nex<span class="sky">Sky</span></div>
  <div>Private &amp; confidential &middot; For NexSky members only</div>
</footer>

<script src="/members/library.js?v=7"></script>
<script>
  const HEADERS = {
    all: ['Research Library', 'Publications & analysis', 'The CIO house view, daily briefings, opportunities and research, in one place.'],
    cio: ['CIO House View', 'House view & positioning', 'Strategic asset allocation and the monthly tactical stance.'],
    briefing: ['Daily Briefing', 'Morning briefing archive', 'Overnight moves, the day ahead, and what we are watching.'],
    opportunities: ['Opportunities', 'Deal teasers & co-investment', 'Private opportunities and co-investment invitations for members.'],
    research: ['Research', 'Notes & white papers', 'In-depth research and thematic work.']
  };
  const params = new URLSearchParams(location.search);
  function setHeader(t){
    const h = HEADERS[t] || HEADERS.all;
    document.getElementById('pLabel').textContent = h[0];
    document.getElementById('pTitle').textContent = h[1];
    document.getElementById('pSub').textContent = h[2];
    document.title = 'NexSky — ' + h[0];
  }
  function setFilter(t){ document.querySelectorAll('.filter').forEach(b => b.classList.toggle('active', b.dataset.type === t)); }
  function setNav(t){ document.querySelectorAll('.nav-center a').forEach(a => a.classList.toggle('active', a.getAttribute('href').includes('type=' + t))); }
  function show(t){ setFilter(t); setNav(t); setHeader(t); renderGrid('libGrid', { type: t }); }
  document.getElementById('filters').addEventListener('click', e => {
    const b = e.target.closest('.filter');
    if (!b) return;
    const t = b.dataset.type;
    history.replaceState(null, '', t === 'all' ? location.pathname : location.pathname + '?type=' + t);
    show(t);
  });
  show(params.get('type') || 'all');
</script>
</body>
</html>
