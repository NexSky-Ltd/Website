<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexSky — Research Library</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231A1F3D'/%3E%3Ctext x='4' y='22' font-family='serif' font-size='18' fill='white'%3EN%3C/text%3E%3Ctext x='16' y='22' font-family='serif' font-size='18' fill='%23B8965A'%3ES%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/members/portal.css">
</head>
<body>

<nav class="nav">
  <div class="nav-left">
    <a href="/members/" class="nav-wordmark">Nex<span class="sky">Sky</span></a>
    <span class="nav-badge">Members</span>
  </div>
  <div class="nav-center">
    <a href="/members/">Hub</a>
    <a href="/members.html">Market Desk</a>
    <a href="/members/research.html" class="active">Research</a>
  </div>
  <a href="/cdn-cgi/access/logout" class="nav-logout">Sign out</a>
</nav>

<header class="page-header">
  <div class="page-header-inner">
    <div class="page-label">Research Library</div>
    <h1 class="page-title">Publications &amp; analysis</h1>
    <p class="page-sub">Research notes, the daily briefing archive, market commentary, and the CIO house view, in one place.</p>
  </div>
</header>

<main>
  <div class="filters" id="filters">
    <button class="filter active" data-type="all">All</button>
    <button class="filter" data-type="research">Research</button>
    <button class="filter" data-type="briefing">Briefings</button>
    <button class="filter" data-type="commentary">Commentary</button>
    <button class="filter" data-type="cio">CIO</button>
  </div>
  <div class="lib-grid" id="libGrid"><div class="lib-empty">Loading&hellip;</div></div>
</main>

<footer class="footer">
  <div class="footer-wordmark">Nex<span class="sky">Sky</span></div>
  <div>Private &amp; confidential &middot; For NexSky members only</div>
</footer>

<script src="/members/library.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  function setActive(t){ document.querySelectorAll('.filter').forEach(b => b.classList.toggle('active', b.dataset.type === t)); }
  function show(t){ setActive(t); renderGrid('libGrid', { type: t }); }
  document.getElementById('filters').addEventListener('click', e => {
    const b = e.target.closest('.filter');
    if (b) show(b.dataset.type);
  });
  show(params.get('type') || 'all');
</script>
</body>
</html>
